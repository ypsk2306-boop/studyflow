<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA-256 Hashing Verification</title>
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      color: #58a6ff;
      border-bottom: 1px solid #21262d;
      padding-bottom: 10px;
    }
    .test-case {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .test-case h3 {
      margin-top: 0;
      color: #f0f6fc;
    }
    .hash-val {
      font-family: monospace;
      background-color: #0d1117;
      padding: 8px 12px;
      border-radius: 4px;
      margin: 8px 0;
      word-break: break-all;
    }
    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.9em;
    }
    .passed {
      background-color: #1f6feb;
      color: #f0f6fc;
    }
    .failed {
      background-color: #da3637;
      color: #f0f6fc;
    }
    pre {
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>SHA-256 Hashing Implementation Test</h1>
  <p>This page compares the output of the native Web Crypto API and the pure-JS fallback implementation on multiple inputs.</p>
  
  <div id="results">Running tests...</div>

  <script type="module">
    // Direct port of the fallbackSha256 function we added to state.js
    function fallbackSha256(ascii) {
      function rightRotate(value, amount) {
        return (value >>> amount) | (value << (32 - amount));
      }
      
      const maxWord = Math.pow(2, 32);
      const hash = [
        0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
      ];
      
      const K = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ];

      const utf8 = [];
      for (let idx = 0; idx < ascii.length; idx++) {
        let charcode = ascii.charCodeAt(idx);
        if (charcode < 0x80) utf8.push(charcode);
        else if (charcode < 0x800) {
          utf8.push(0xc0 | (charcode >> 6), 0x80 | (charcode & 0x3f));
        }
        else if (charcode < 0xd800 || charcode >= 0xe000) {
          utf8.push(0xe0 | (charcode >> 12), 0x80 | ((charcode>>6) & 0x3f), 0x80 | (charcode & 0x3f));
        }
        else {
          idx++;
          charcode = 0x10000 + (((charcode & 0x3ff)<<10) | (ascii.charCodeAt(idx) & 0x3ff));
          utf8.push(0xf0 | (charcode >> 18), 0x80 | ((charcode>>12) & 0x3f), 0x80 | ((charcode>>6) & 0x3f), 0x80 | (charcode & 0x3f));
        }
      }

      const msgLenBits = utf8.length * 8;
      utf8.push(0x80);
      
      while ((utf8.length % 64) !== 56) {
        utf8.push(0);
      }
      
      const lengthBuffer = new ArrayBuffer(8);
      const view = new DataView(lengthBuffer);
      view.setUint32(0, Math.floor(msgLenBits / maxWord));
      view.setUint32(4, msgLenBits % maxWord);
      
      for (let idx = 0; idx < 8; idx++) {
        utf8.push(view.getUint8(idx));
      }
      
      const chunks = utf8.length / 64;
      
      for (let chunkIdx = 0; chunkIdx < chunks; chunkIdx++) {
        const w = new Uint32Array(64);
        const chunkOffset = chunkIdx * 64;
        
        for (let idx = 0; idx < 16; idx++) {
          w[idx] = (utf8[chunkOffset + idx*4] << 24) |
                   (utf8[chunkOffset + idx*4 + 1] << 16) |
                   (utf8[chunkOffset + idx*4 + 2] << 8) |
                   (utf8[chunkOffset + idx*4 + 3]);
        }
        
        for (let idx = 16; idx < 64; idx++) {
          const s0 = rightRotate(w[idx-15], 7) ^ rightRotate(w[idx-15], 18) ^ (w[idx-15] >>> 3);
          const s1 = rightRotate(w[idx-2], 17) ^ rightRotate(w[idx-2], 19) ^ (w[idx-2] >>> 10);
          w[idx] = (w[idx-16] + s0 + w[idx-7] + s1) | 0;
        }
        
        let [a, b, c, d, e, f, g, h] = hash;
        
        for (let idx = 0; idx < 64; idx++) {
          const S1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
          const ch = (e & f) ^ (~e & g);
          const temp1 = (h + S1 + ch + K[idx] + w[idx]) | 0;
          const S0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
          const maj = (a & b) ^ (a & c) ^ (b & c);
          const temp2 = (S0 + maj) | 0;
          
          h = g;
          g = f;
          f = e;
          e = (d + temp1) | 0;
          d = c;
          c = b;
          b = a;
          a = (temp1 + temp2) | 0;
        }
        
        hash[0] = (hash[0] + a) | 0;
        hash[1] = (hash[1] + b) | 0;
        hash[2] = (hash[2] + c) | 0;
        hash[3] = (hash[3] + d) | 0;
        hash[4] = (hash[4] + e) | 0;
        hash[5] = (hash[5] + f) | 0;
        hash[6] = (hash[6] + g) | 0;
        hash[7] = (hash[7] + h) | 0;
      }
      
      return hash.map(h => (h >>> 0).toString(16).padStart(8, '0')).join('');
    }

    async function webCryptoSha256(password) {
      const msgUint8 = new TextEncoder().encode(password);
      const hashBuffer = await window.crypto.subtle.digest('SHA-256', msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    const testCases = [
      "",
      "a",
      "hello",
      "password123",
      "A very long sentence to check if multiple blocks of 512-bits are hashed correctly by the custom implementation. Let's make it even longer than 64 characters so that it has multiple 512-bit blocks.",
      "🚀 Sparkles & Emojis Test",
      "unicode_测试_tést"
    ];

    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';

    for (const test of testCases) {
      const card = document.createElement('div');
      card.className = 'test-case';
      
      const title = document.createElement('h3');
      title.textContent = `Input: "${test}"`;
      card.appendChild(title);

      try {
        const expected = await webCryptoSha256(test);
        const actual = fallbackSha256(test);
        
        const expLabel = document.createElement('div');
        expLabel.innerHTML = `<strong>Web Crypto:</strong> <div class="hash-val">${expected}</div>`;
        card.appendChild(expLabel);

        const actLabel = document.createElement('div');
        actLabel.innerHTML = `<strong>Fallback JS:</strong> <div class="hash-val">${actual}</div>`;
        card.appendChild(actLabel);

        const statusLabel = document.createElement('span');
        if (expected === actual) {
          statusLabel.className = 'status passed';
          statusLabel.textContent = 'PASSED (Identical Hash)';
        } else {
          statusLabel.className = 'status failed';
          statusLabel.textContent = 'FAILED (Mismatched Hash)';
        }
        card.appendChild(statusLabel);

      } catch (err) {
        const errLabel = document.createElement('span');
        errLabel.className = 'status failed';
        errLabel.textContent = `Error running Web Crypto: ${err.message}`;
        card.appendChild(errLabel);
      }

      resultsEl.appendChild(card);
    }
  </script>
</body>
</html>
